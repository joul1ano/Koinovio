spring:
  application:
    name: management-service

  datasource:
    url: jdbc:postgresql://localhost:5432/koinovioManagement
    username: ${KOINOVIO_MANAGEMENT_DB_USERNAME}
    password: ${KOINOVIO_MANAGEMENT_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: ${KOINOVIO_RABBITMQ_USERNAME}
    password: ${KOINOVIO_RABBITMQ_PASSWORD}

jwt:
  secretKey: ${KOINOVIO_SECRET_KEY}